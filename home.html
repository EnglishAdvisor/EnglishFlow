<head>

<title>EnglishFlow — Minha jornada</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#127754;</text></svg>">
<style>
:root{
 --navy2:#0f2438; --bg:#0a1a2b; --tx:#eaf1f8; --tx2:#93a8be;
 --line:rgba(255,255,255,.13); --card:rgba(255,255,255,.05);
 --og:#f59e0b; --bst:#c8e63c; --bel:#38bdf8; --wc:#a78bfa;
 --ac:var(--og);
 --fh:'Bahnschrift','Arial Narrow','Roboto Condensed',system-ui,sans-serif;
 --fb:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--fb);color:var(--tx);min-height:100vh;padding:24px 16px 56px;
 background:radial-gradient(1000px 560px at 50% -6%,rgba(255,255,255,.06),transparent 60%),
 linear-gradient(var(--navy2),var(--bg));background-attachment:fixed}
.wrap{max-width:560px;margin:0 auto}
h1,h2,h3,.hf{font-family:var(--fh);letter-spacing:.02em}
.brand{font-family:var(--fh);font-weight:700;font-size:22px;text-transform:uppercase;text-align:center;margin-bottom:2px}
.brand em{font-style:normal;color:var(--ac)}
.tagline{text-align:center;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--tx2);margin-bottom:22px}
.hello{font-family:var(--fh);font-size:clamp(26px,7vw,34px);text-transform:uppercase;line-height:1.05;margin-bottom:4px}
.hello span{color:var(--ac)}
.pos{font-size:13.5px;color:var(--tx2);margin-bottom:18px}
.hero{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--ac);
 border-radius:16px;padding:20px 18px;margin-bottom:16px}
.hero .lab{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ac);font-weight:700}
.hero .unit{font-family:var(--fh);font-size:clamp(22px,6vw,30px);text-transform:uppercase;line-height:1.1;margin:6px 0 2px}
.hero .book{font-size:12.5px;color:var(--tx2);letter-spacing:.06em}
.offshore{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.35);border-radius:12px;
 padding:12px 14px;font-size:13px;color:var(--tx);margin-bottom:16px;line-height:1.5}
.offshore b{color:var(--ac)}
.sec{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--tx2);margin:18px 2px 10px}
.caps{display:flex;flex-direction:column;gap:9px}
.cap{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);
 border-radius:13px;padding:13px 15px;text-decoration:none;color:var(--tx);transition:.15s;min-height:52px}
.cap:hover,.cap:active{background:rgba(255,255,255,.11);border-color:var(--ac)}
.cap .n{flex:0 0 auto;width:30px;height:30px;border-radius:9px;background:var(--ac);color:var(--navy2);
 font-family:var(--fh);font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center}
.cap .t{flex:1;font-size:15.5px}
.cap .go{flex:0 0 auto;color:var(--tx2);font-size:20px}
.game{display:flex;align-items:center;gap:14px;background:linear-gradient(100deg,rgba(255,255,255,.10),rgba(255,255,255,.04));
 border:1px solid var(--line);border-radius:16px;padding:18px;text-decoration:none;color:var(--tx);margin:8px 0 4px}
.game:hover{border-color:var(--ac)}
.game .ico{font-size:30px}
.game .tt{font-family:var(--fh);font-size:19px;text-transform:uppercase;line-height:1}
.game .ss{font-size:12.5px;color:var(--tx2);margin-top:3px}
.foot{margin-top:28px;padding-top:14px;border-top:1px solid var(--line);font-size:11.5px;color:var(--tx2);text-align:center;line-height:1.6}
/* seletor quando não há ?aluno= */
.pick{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
.pick a{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:15px;text-decoration:none;
 color:var(--tx);font-family:var(--fh);font-size:16px;text-transform:uppercase;text-align:center}
.pick a:hover{background:rgba(255,255,255,.10)}
</style>
</head>

const BASE = location.href.replace(/[^?#]*$/, '').replace(/[?#].*$/, '');
const COR = {og:'--og',bst:'--bst',bel:'--bel',wc:'--wc'};
function el(h){const d=document.createElement('div');d.innerHTML=h.trim();return d.firstChild}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

function findStudent(name){
 if(!name) return null;
 const n=name.trim().toLowerCase();
 return D.students.find(s=>s.nome.toLowerCase()===n) || null;
}
function picker(){
 const v=document.getElementById('view');
 v.innerHTML='<div class="pos">Escolha seu nome pra abrir sua jornada:</div>';
 const g=el('<div class="pick"></div>');
 D.students.forEach(s=>{
  const a=document.createElement('a'); a.href='?aluno='+encodeURIComponent(s.nome);
  a.textContent=s.nome; g.appendChild(a);
 });
 v.appendChild(g);
}
function render(s){
 const b=D.books.find(x=>x.id===s.book);
 const u=b.units.find(x=>x.n==s.unit);
 document.documentElement.style.setProperty('--ac','var('+COR[s.book]+')');
 const v=document.getElementById('view'); v.innerHTML='';
 v.appendChild(el('<div class="hello">Olá, <span>'+esc(s.nome)+'</span> 👋</div>'));
 v.appendChild(el('<div class="pos">Bora continuar de onde você parou.</div>'));
 v.appendChild(el('<div class="hero"><div class="lab">Você está aqui</div>'+
   '<div class="unit">Unit '+u.n+' — '+esc(u.titulo)+'</div>'+
   '<div class="book">'+esc(b.nome)+' · '+esc(b.livro)+'</div></div>'));
 if(s.offshore){
  v.appendChild(el('<div class="offshore">⚓ <b>De volta do embarque?</b> Suas aulas do mês não acumulam — '+
   'fala com o teacher assim que descer pra marcar as que faltam.</div>'));
 }
 v.appendChild(el('<div class="sec">As cápsulas da sua unidade — uma por vez</div>'));
 const l=el('<div class="caps"></div>');
 u.caps.forEach(c=>{
  const a=document.createElement('a'); a.className='cap';
  a.href=c.u+'?aluno='+encodeURIComponent(s.nome); a.target='_blank'; a.rel='noopener';
  a.innerHTML='<span class="n">'+esc(c.n||'•')+'</span><span class="t">'+esc(c.t)+'</span><span class="go">›</span>';
  l.appendChild(a);
 });
 v.appendChild(l);
 v.appendChild(el('<div class="sec">Seu treino do dia off</div>'));
 const g=document.createElement('a'); g.className='game';
 g.href=s.game+'?aluno='+encodeURIComponent(s.nome); g.target='_blank'; g.rel='noopener';
 g.innerHTML='<span class="ico">🎮</span><span><span class="tt">Abrir meu jogo</span>'+
   '<span class="ss">Pratique nos dias sem aula ao vivo</span></span>';
 v.appendChild(g);
}
const nome=new URLSearchParams(location.search).get('aluno');
const s=findStudent(nome);
if(s) render(s); else picker();
