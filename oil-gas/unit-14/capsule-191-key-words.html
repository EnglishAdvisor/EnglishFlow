<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Key Words · Unit 14 — Emergencies</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0f1e;font-family:'Barlow',sans-serif;min-height:100vh}
.header{background:#0d1b2a;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid rgba(231,76,60,.25)}
.pill-title{font-family:'Barlow Condensed',sans-serif;font-size:clamp(28px,5vw,48px);font-weight:700;color:#f0958d;line-height:1}
.pill-title span{color:#e74c3c;font-size:clamp(14px,2.5vw,22px);font-weight:600;display:block;letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.icon-box{width:48px;height:48px;border:1.5px solid rgba(231,76,60,.4);border-radius:50%;display:flex;align-items:center;justify-content:center}
.icon-box svg{width:26px;height:26px;stroke:#e74c3c;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.translate-warning{background:#0d1b2a;border-bottom:1px solid rgba(231,76,60,.2);padding:6px 24px;font-size:11px;color:#f0958d;text-align:center}
.translate-warning strong{color:#e74c3c}
.content{max-width:860px;margin:0 auto;padding:20px 16px 32px}
.section-label{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:#e74c3c;text-transform:uppercase;letter-spacing:.1em;margin:0 0 10px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:20px}
.flip-card{height:110px;cursor:pointer;perspective:800px}
.flip-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .45s}
.flip-card.flipped .flip-inner{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;inset:0;border-radius:10px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;text-align:center}
.flip-front{background:#111827;border:1px solid rgba(231,76,60,.25)}
.flip-back{background:#0a1628;border:1px solid rgba(231,76,60,.4);transform:rotateY(180deg)}
.front-word{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:#f0958d;line-height:1.2;margin-bottom:4px}
.front-pos{font-size:10px;color:#4a6a8a;text-transform:uppercase;letter-spacing:.08em}
.front-hint{font-size:10px;color:#4a6a8a;margin-top:4px}
.back-def{font-size:12px;color:#c8d8e8;line-height:1.5}
.controls{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.counter{font-family:'Barlow Condensed',sans-serif;font-size:14px;color:#4a6a8a}
.counter span{color:#e74c3c;font-weight:700}
.reset-btn{background:transparent;border:1px solid rgba(231,76,60,.25);color:#4a6a8a;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;border-radius:8px;padding:6px 18px;cursor:pointer}
.footer{background:#0d1b2a;padding:10px 24px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(231,76,60,.2);margin-top:4px}
.footer-left{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:#4a6a8a}
.footer-right{display:flex;align-items:center;gap:10px}
.footer-icon svg{width:22px;height:22px;stroke:#e74c3c;fill:none;stroke-width:1.5}
.footer-text{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;color:#e74c3c;letter-spacing:.06em;text-transform:uppercase}
</style>
</head>
<body>
<div class="header">
  <div class="pill-title">Key Words<span>Unit 14 — Emergencies</span></div>
  <div class="icon-box"><svg viewBox="0 0 24 24"><path d="m15 5 4 4"/><path d="M13 7 8.7 2.7a2.41 2.41 0 0 0-3.4 0L2.7 5.3a2.41 2.41 0 0 0 0 3.4L7 13"/><path d="m8 6 2-2"/><path d="m2 22 5.5-5.5"/><path d="M17 7l4.3 4.3c.94.94.94 2.46 0 3.4l-2.6 2.6c-.94.94-2.46.94-3.4 0L11 13"/><path d="m16 18 2 2"/><path d="m13 13-3 3"/></svg></div>
</div>
<div class="translate-warning">🌐 <strong>This page is in English on purpose.</strong> If your browser offers to translate it, please decline / <em>Por favor, não traduza esta página.</em></div>
<div class="content">
  <div class="controls">
    <div class="counter">Flipped: <span id="cnt">0</span> / 15</div>
    <button class="reset-btn" onclick="resetAll()">Reset all</button>
  </div>

  <div class="section-label">Nouns</div>
  <div class="cards-grid" id="nouns-grid"></div>

  <div class="section-label">Verbs</div>
  <div class="cards-grid" id="verbs-grid"></div>
</div>
<div class="footer">
  <div class="footer-left">Capsule 191 de 191 · Unit 14 — Emergencies</div>
  <div class="footer-right">
    <div class="footer-icon"><svg viewBox="0 0 24 24"><path d="m15 5 4 4"/><path d="M13 7 8.7 2.7a2.41 2.41 0 0 0-3.4 0L2.7 5.3a2.41 2.41 0 0 0 0 3.4L7 13"/></svg></div>
    <div class="footer-text">Unit 14 — Emergencies</div>
  </div>
</div>
<script>
var nouns=[
  {w:'ambulance',pos:'noun',hint:'emergency vehicle',def:'A vehicle that takes injured people to hospital quickly.'},
  {w:'defibrillator',pos:'noun',hint:'cardiac device',def:'A device that delivers an electric shock to restart the heart.'},
  {w:'emergency shower',pos:'noun',hint:'safety station',def:'A shower used to wash off dangerous chemicals from skin or eyes.'},
  {w:'fire engine',pos:'noun',hint:'firefighting vehicle',def:'A large vehicle with equipment to fight fires.'},
  {w:'fire extinguisher',pos:'noun',hint:'portable device',def:'A portable device to put out small fires.'},
  {w:'first aid kit',pos:'noun',hint:'medical supplies box',def:'A box with basic medical supplies for treating injuries on site.'},
  {w:'medical oxygen',pos:'noun',hint:'breathing aid',def:'Pure oxygen supplied to patients who have difficulty breathing.'},
  {w:'SCBA',pos:'noun',hint:'breathing apparatus',def:'Self-Contained Breathing Apparatus — used in toxic or smoky environments.'},
  {w:'stretcher',pos:'noun',hint:'carrying frame',def:'A frame used to carry an injured person lying down.'}
];
var verbs=[
  {w:'activate',pos:'verb',hint:'start a system',def:'To start or trigger a system, alarm, or device. "Activate the fire alarm."'},
  {w:'assess',pos:'verb',hint:'evaluate the situation',def:'To carefully look at a situation to understand what is wrong. "Assess the scene."'},
  {w:'deal with',pos:'verb (phrase)',hint:'handle a problem',def:'To take action to manage or solve a problem. "Deal with the emergency."'},
  {w:'ensure',pos:'verb',hint:'make certain',def:'To make sure something happens or is safe. "Ensure the area is safe."'},
  {w:'evacuate',pos:'verb',hint:'leave a dangerous place',def:'To move people away from a dangerous area. "Evacuate the platform."'},
  {w:'react',pos:'verb',hint:'respond quickly',def:'To respond to a situation, especially quickly. "React to the fire alarm."'}
];
var flipped=new Set();
function makeCard(item,idx,type){
  var id=type+'-'+idx;
  var div=document.createElement('div');
  div.className='flip-card';
  div.id=id;
  div.innerHTML='<div class="flip-inner"><div class="flip-front"><div class="front-word">'+item.w+'</div><div class="front-pos">'+item.pos+'</div><div class="front-hint">'+item.hint+'</div></div><div class="flip-back"><div class="back-def">'+item.def+'</div></div></div>';
  div.addEventListener('click',function(){
    this.classList.toggle('flipped');
    if(this.classList.contains('flipped'))flipped.add(id);else flipped.delete(id);
    document.getElementById('cnt').textContent=flipped.size;
  });
  return div;
}
var ng=document.getElementById('nouns-grid');
nouns.forEach(function(item,i){ng.appendChild(makeCard(item,i,'n'));});
var vg=document.getElementById('verbs-grid');
verbs.forEach(function(item,i){vg.appendChild(makeCard(item,i,'v'));});
function resetAll(){
  document.querySelectorAll('.flip-card').forEach(function(c){c.classList.remove('flipped');});
  flipped.clear();
  document.getElementById('cnt').textContent='0';
}
</script>
</body>
</html>
