<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnglishFlow — Acesso</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0f1e;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: #0d1b2a;
    border: 1px solid #0077b640;
    border-radius: 16px;
    padding: 32px 24px;
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: #90c8e0;
    letter-spacing: 0.02em;
    line-height: 1;
  }
  .logo span { color: #0077b6; }

  .capsule-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #0077b6;
    letter-spacing: 0.04em;
    margin-top: 4px;
  }

  .capsule-info {
    font-size: 12px;
    color: #4a6a8a;
    margin-top: 2px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
  }

  .field label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #0077b6;
    font-weight: 600;
  }

  .input-wrap {
    position: relative;
    width: 100%;
  }

  .input-wrap input {
    width: 100%;
    background: #0a1628;
    border: 1px solid #0077b640;
    border-radius: 8px;
    padding: 11px 44px 11px 14px;
    color: #c8d8e8;
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }

  .input-wrap input:focus {
    border-color: #0077b6;
  }

  .toggle-pw {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    color: #4a6a8a;
    display: flex;
    align-items: center;
  }
  .toggle-pw svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.5; }

  .btn {
    width: 100%;
    background: #0077b6;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 13px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }
  .btn:hover { background: #005f92; }
  .btn:active { background: #004d7a; }

  .error {
    font-size: 12px;
    color: #ef4444;
    text-align: center;
    display: none;
    padding: 8px;
    background: #ef444415;
    border-radius: 6px;
    border: 1px solid #ef444430;
  }
  .error.show { display: block; }

  /* Desktop: card slightly larger */
  @media (min-width: 600px) {
    .card { padding: 40px 36px; gap: 22px; }
    .logo { font-size: 36px; }
  }
</style>
</head>
<body>
<div class="card">
  <div>
    <div class="logo">English<span>Flow</span></div>
    <p class="capsule-name">Background · Unit 8 — Working Offshore</p>
    <p class="capsule-info">Digite a senha da sua trilha para acessar.</p>
  </div>

  <div class="field">
    <label for="pwd">Senha de acesso</label>
    <div class="input-wrap">
      <input type="password" id="pwd" autocomplete="current-password" placeholder="••••••••••"
        onkeydown="if(event.key==='Enter')check()">
      <button class="toggle-pw" type="button" onclick="togglePw()" aria-label="Mostrar senha">
        <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>

  <p class="error" id="err">Senha incorreta. Verifique com seu teacher.</p>

  <button class="btn" onclick="check()">Acessar</button>
</div>

<script>
  function check() {
    const v = document.getElementById('pwd').value.trim();
    if (v === 'offshore26') {
      window.location.href = 'capsule-1-background.html';
    } else {
      document.getElementById('err').classList.add('show');
      document.getElementById('pwd').value = '';
      document.getElementById('pwd').focus();
    }
  }

  function togglePw() {
    const input = document.getElementById('pwd');
    input.type = input.type === 'password' ? 'text' : 'password';
  }
</script>
</body>
</html>
